# eval_dataset.yaml
# RAGuard 评测数据集 — 劳动法 & 刑法

- question: "劳动合同期满，用人单位不续签，需要支付经济补偿金吗？"
  reference_answer: "需要。根据《劳动合同法》第四十六条第五项，除用人单位维持或者提高劳动合同约定条件续订劳动合同，劳动者不同意续订的情形外，依照本法第四十四条第一项规定终止固定期限劳动合同的，用人单位应当向劳动者支付经济补偿。经济补偿按劳动者在本单位工作的年限，每满一年支付一个月工资的标准向劳动者支付。"
  category: "劳动法"
  difficulty: "easy"

- question: "试用期的最长时间是多久？"
  reference_answer: "根据《劳动合同法》第十九条，劳动合同期限三个月以上不满一年的，试用期不得超过一个月；劳动合同期限一年以上不满三年的，试用期不得超过二个月；三年以上固定期限和无固定期限的劳动合同，试用期不得超过六个月。同一用人单位与同一劳动者只能约定一次试用期。"
  category: "劳动法"
  difficulty: "easy"

